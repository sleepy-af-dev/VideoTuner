name: Dependabot auto-merge

# Auto-merge the low-risk Dependabot PRs: github-actions updates (any level) and patch-level
# bumps in any ecosystem. Minor and major bumps are left for manual review. Auto-merge only
# completes once the required checks pass, so the tests remain the gate.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge
        if: >
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          startsWith(github.head_ref, 'dependabot/github_actions/')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
